name: fridgee
description: "Fridgee — Inteligentny Menedżer Żywności. Zero Waste, AI Recipes, Barcode Scanner."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.6.2

  # ── Local Database ────────────────────────────────────────────────────────────
  # sqflite: fast SQLite for offline-first storage. Compatible with all Dart 3.x
  # code-gen tooling (no analyzer version conflicts unlike Isar 3.x).
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # ── Remote Database & Auth (Firebase) ─────────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0

  # ── Authentication ────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # ── Scanner & Vision (on-device) ─────────────────────────────────────────────
  mobile_scanner: ^7.2.0
  google_mlkit_text_recognition: ^0.15.1

  # ── Data Classes ─────────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Networking ────────────────────────────────────────────────────────────────
  # Open Food Facts (primary, no key) and USDA FoodData (fallback)
  # retrofit added back in Module 4 when API clients are fully implemented
  dio: ^5.7.0

  # ── Environment / API Keys ───────────────────────────────────────────────────
  # Keys injected via --dart-define or .env (never committed to git)
  flutter_dotenv: ^5.2.1

  # ── UI / Typography ──────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # ── Notifications ─────────────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.1.6

  # ── Utilities ─────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────────
  build_runner: ^2.4.13
  freezed: ^2.4.4
  riverpod_generator: ^2.6.1
  # retrofit_generator: added in Module 4
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - .env

  # Google Fonts (Inter / Montserrat) are loaded dynamically
  # via the google_fonts package — no local font assets needed.
